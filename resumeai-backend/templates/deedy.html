<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deedy Resume Template</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@300;400;600;700&display=swap');

        @page {
            margin: 0;
            size: A4;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            padding: 30pt;
            width: 210mm;
            min-height: {{PAGE_HEIGHT}};
            box-sizing: border-box;
            background: white;
            color: #333;
            font-size: 9pt;
            line-height: 1.3;
        }

        header {
            text-align: center;
            margin-bottom: 15pt;
        }

        header h1 {
            font-family: 'Merriweather', serif;
            font-size: 26pt;
            margin: 0;
            color: #111;
            text-transform: uppercase;
            font-weight: 300;
        }

        .contact-line {
            font-size: 9pt;
            margin-top: 5pt;
            color: #666;
        }

        .sep {
            margin: 0 5pt;
            color: #ccc;
        }

        a {
            color: #1a4a8a;
            text-decoration: none;
        }

        .summary-section {
            margin-bottom: 20pt;
            text-align: center;
            padding: 0 40pt;
        }

        .main-container {
            display: flex;
            gap: 20pt;
        }

        .column-left {
            flex: 1.5;
        }

        .column-right {
            flex: 1;
        }

        h2 {
            font-family: 'Merriweather', serif;
            font-size: 13pt;
            color: #1a4a8a;
            text-transform: uppercase;
            border-bottom: 1px solid #ddd;
            margin-top: 15pt;
            margin-bottom: 8pt;
            padding-bottom: 2pt;
        }

        .entry {
            margin-bottom: 12pt;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2pt;
        }

        .entry-title {
            font-weight: 700;
            font-size: 10pt;
            color: #111;
        }

        .entry-sub {
            font-weight: 600;
            color: #555;
            font-size: 9pt;
        }

        .entry-right {
            font-weight: 400;
            color: #666;
            font-size: 8.5pt;
        }

        .bullets {
            margin: 3pt 0 0 10pt;
            padding: 0;
            list-style-type: circle;
        }

        .bullets li {
            margin-bottom: 2pt;
        }

        .skill-row {
            margin-bottom: 10pt;
        }

        .skill-cat {
            display: block;
            font-weight: 700;
            font-size: 9pt;
            color: #111;
            margin-bottom: 2pt;
            text-transform: uppercase;
        }

        .skill-vals {
            font-size: 8.5pt;
            color: #444;
        }
        
        .tech-stack {
            font-weight: 700;
            color: #1a4a8a;
            font-size: 8.5pt;
        }
    </style>
</head>
<body>
    <header>
        <h1>{{NAME}}</h1>
        <div class="contact-line">
            {{CONTACT}}
        </div>
    </header>

    <div class="summary-section">
        {{SUMMARY}}
    </div>

    <div class="main-container">
        <div class="column-left">
            <h2>Experience</h2>
            {{EXPERIENCE}}

            <h2>Projects</h2>
            {{PROJECTS}}
        </div>

        <div class="column-right">
            <h2>Skills</h2>
            {{SKILLS}}

            <h2>Education</h2>
            {{EDUCATION}}

            <h2>Certifications</h2>
            {{CERTS}}
        </div>
    </div>
</body>
</html>
