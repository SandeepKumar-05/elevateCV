<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AltaCV Resume Template</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        @page {
            margin: 0;
            size: A4;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            width: 210mm;
            min-height: {{PAGE_HEIGHT}};
            box-sizing: border-box;
            background: white;
            color: #2e3440;
            font-size: 10pt;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 25pt 35pt;
            border-bottom: 2pt solid #2c5f8a;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .header-left h1 {
            font-size: 32pt;
            margin: 0;
            font-weight: 700;
            color: #2c5f8a;
            line-height: 1;
        }

        .header-left .tagline {
            font-size: 12pt;
            color: #4c566a;
            margin-top: 5pt;
            font-weight: 300;
        }

        .header-right {
            text-align: right;
            font-size: 9pt;
            color: #4c566a;
        }

        .sep {
            margin: 0 5pt;
            color: #d8dee9;
        }

        a {
            color: #2c5f8a;
            text-decoration: none;
        }

        .main-container {
            display: flex;
            flex-grow: 1;
        }

        .main-content {
            flex: 1.6;
            padding: 20pt 35pt;
            box-sizing: border-box;
        }

        .sidebar {
            flex: 1;
            background-color: #f8f9fc;
            padding: 20pt 25pt;
            box-sizing: border-box;
            border-left: 3px solid #2c5f8a;
        }

        h2 {
            font-size: 14pt;
            font-weight: 700;
            color: #2c5f8a;
            text-transform: uppercase;
            margin-top: 20pt;
            margin-bottom: 12pt;
            display: flex;
            align-items: center;
        }

        h2::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #d8dee9;
            margin-left: 10pt;
        }

        .summary-text {
            margin-bottom: 15pt;
            line-height: 1.5;
            text-align: justify;
        }

        .entry {
            margin-bottom: 15pt;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3pt;
        }

        .entry-title {
            font-weight: 700;
            font-size: 11pt;
            color: #2c5f8a;
        }

        .entry-sub {
            font-weight: 600;
            color: #4c566a;
            font-style: italic;
        }

        .entry-right {
            font-weight: 600;
            color: #2c5f8a;
            font-size: 9pt;
        }

        .bullets {
            margin: 5pt 0 0 12pt;
            padding: 0;
            list-style-type: square;
        }

        .bullets li {
            margin-bottom: 4pt;
        }

        .skill-row {
            margin-bottom: 12pt;
        }

        .skill-cat {
            display: block;
            font-weight: 700;
            font-size: 9.5pt;
            color: #2c5f8a;
            margin-bottom: 4pt;
        }

        .skill-vals {
            font-size: 9pt;
            color: #4c566a;
            line-height: 1.4;
        }
        
        .tech-stack {
            font-weight: 600;
            font-size: 8.5pt;
            background: #e5e9f0;
            padding: 2pt 5pt;
            border-radius: 3pt;
            color: #2c5f8a;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <h1>{{NAME}}</h1>
            <div class="tagline">Resume generated by AI</div>
        </div>
        <div class="header-right">
            {{CONTACT}}
        </div>
    </header>

    <div class="main-container">
        <main class="main-content">
            <h2>Experience</h2>
            {{EXPERIENCE}}

            <h2>Projects</h2>
            {{PROJECTS}}
        </main>

        <aside class="sidebar">
            <h2>Profile</h2>
            <div class="summary-text">{{SUMMARY}}</div>

            <h2>Skills</h2>
            {{SKILLS}}

            <h2>Education</h2>
            {{EDUCATION}}

            <h2>Certifications</h2>
            {{CERTS}}
        </aside>
    </div>
</body>
</html>
